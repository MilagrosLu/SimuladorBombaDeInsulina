<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Cuerpo principal de la bomba -->
  <rect x="14" y="6" width="26" height="42" rx="6" fill="#0ea5e9" opacity="0.95"/>
  <!-- Borde del cuerpo -->
  <rect x="14" y="6" width="26" height="42" rx="6" stroke="#0284c7" stroke-width="1.5" fill="none"/>

  <!-- Ventana del reservorio -->
  <rect x="19" y="11" width="16" height="16" rx="3" fill="#082f49" opacity="0.5"/>
  <!-- Nivel de insulina en el reservorio (parte llena) -->
  <rect x="20" y="18" width="14" height="8" rx="2" fill="#bae6fd" opacity="0.75"/>
  <!-- Burbujas decorativas en reservorio -->
  <circle cx="25" cy="21" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="29" cy="19" r="1" fill="white" opacity="0.3"/>

  <!-- Pantalla / display -->
  <rect x="19" y="30" width="16" height="11" rx="2" fill="#0c1a2e" opacity="0.7"/>
  <!-- Línea de onda de glucosa en pantalla -->
  <polyline points="20,36 22,36 23.5,33 25,38 26.5,33 28,36.5 29.5,36 34,36"
    stroke="#22d3a6" stroke-width="1.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Botón lateral -->
  <rect x="40" y="20" width="6" height="10" rx="3" fill="#3b82f6" opacity="0.9"/>
  <rect x="40" y="20" width="6" height="10" rx="3" stroke="#1d4ed8" stroke-width="0.8" fill="none"/>

  <!-- Conector inferior de la cánula -->
  <rect x="23" y="48" width="8" height="4" rx="2" fill="#0284c7"/>
  
  <!-- Tubo flexible -->
  <path d="M27 52 Q27 57 31 57 L44 57" stroke="#0284c7" stroke-width="2.5"
    fill="none" stroke-linecap="round"/>
  <!-- Punta de la cánula -->
  <circle cx="44" cy="57" r="2.5" fill="#0ea5e9"/>
  <circle cx="44" cy="57" r="1" fill="white" opacity="0.6"/>
</svg>
